  <meta charset="UTF-8"/>

  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *,body{font-family:'DM Sans',sans-serif;box-sizing:border-box;}
    html,body{background:#020617;margin:0;padding:0;}
    .hs::-webkit-scrollbar{display:none;}
    .hs{-ms-overflow-style:none;scrollbar-width:none;}
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0;}
    input[type=search]::-webkit-search-cancel-button{display:none;}
    input,select,button{-webkit-tap-highlight-color:transparent;}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const BLANK = {name:"",retailPrice:"",wholesalePrice:"",notes:""};
const fmt = v => v!==""&&v!==undefined&&v!==null ? "₹"+Number(v).toLocaleString("en-IN") : "—";
const today = () => new Date().toLocaleDateString("en-IN");

/* ─── Icons ───────────────────────────────────────────────────── */
const Ico = ({d,size=18,stroke="currentColor",sw=2.2}) => (
  <svg viewBox="0 0 24 24" fill="none" stroke={stroke} strokeWidth={sw}
    strokeLinecap="round" strokeLinejoin="round" style={{width:size,height:size,flexShrink:0}}>
    {d}
  </svg>
);
const ISearch = () => <Ico d={<><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></>}/>;
const IEdit   = () => <Ico size={15} d={<><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></>}/>;
const ITrash  = () => <Ico size={15} d={<><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/><path d="M9 6V4h6v2"/></>}/>;
const IPlus   = () => <Ico size={28} sw={2.8} d={<><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>}/>;
const IClose  = () => <Ico size={20} sw={2.5} d={<><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>}/>;

/* ─── Product Card ────────────────────────────────────────────── */
function Card({p, onEdit, onDelete}){
  const hasWhole = p.wholesalePrice !== "" && p.wholesalePrice !== undefined;
  return (
    <div style={{background:"#1e293b",border:"1px solid #334155",borderRadius:18,padding:"14px 14px 12px",display:"flex",gap:10,alignItems:"flex-start",boxShadow:"0 2px 12px rgba(0,0,0,0.25)"}}>
      {/* Main info */}
      <div style={{flex:1,minWidth:0}}>
        <p style={{color:"#f1f5f9",fontWeight:800,fontSize:16,lineHeight:1.25,margin:"0 0 10px 0",wordBreak:"break-word"}}>{p.name}</p>

        {/* Price row */}
        <div style={{display:"grid",gridTemplateColumns:hasWhole?"1fr 1fr":"1fr",gap:8,marginBottom:p.notes?8:0}}>
          {/* Retail */}
          <div style={{background:"#0f172a",borderRadius:12,padding:"8px 10px",textAlign:"center",border:"1px solid #1e3a2f"}}>
            <p style={{color:"#64748b",fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:1,margin:"0 0 3px 0"}}>Retail</p>
            <p style={{color:"#4ade80",fontWeight:800,fontSize:20,margin:0,lineHeight:1}}>{fmt(p.retailPrice)}</p>
          </div>
          {/* Wholesale */}
          {hasWhole && (
            <div style={{background:"#0f172a",borderRadius:12,padding:"8px 10px",textAlign:"center",border:"1px solid #1e3050"}}>
              <p style={{color:"#64748b",fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:1,margin:"0 0 3px 0"}}>Wholesale</p>
              <p style={{color:"#38bdf8",fontWeight:800,fontSize:20,margin:0,lineHeight:1}}>{fmt(p.wholesalePrice)}</p>
            </div>
          )}
        </div>

        {/* Notes */}
        {p.notes && (
          <p style={{color:"#f59e0b",fontSize:12,fontWeight:600,background:"rgba(245,158,11,0.1)",border:"1px solid rgba(245,158,11,0.25)",borderRadius:8,padding:"4px 8px",margin:"8px 0 0 0",display:"inline-block"}}>
            📦 {p.notes}
          </p>
        )}
      </div>

      {/* Buttons */}
      <div style={{display:"flex",flexDirection:"column",gap:8,flexShrink:0}}>
        <button onClick={()=>onEdit(p)} aria-label="Edit"
          style={{width:38,height:38,borderRadius:10,background:"rgba(59,130,246,0.15)",
            border:"1px solid rgba(59,130,246,0.3)",color:"#60a5fa",display:"flex",
            alignItems:"center",justifyContent:"center",cursor:"pointer"}}>
          <IEdit/>
        </button>
        <button onClick={()=>onDelete(p)} aria-label="Delete"
          style={{width:38,height:38,borderRadius:10,background:"rgba(239,68,68,0.15)",
            border:"1px solid rgba(239,68,68,0.3)",color:"#f87171",display:"flex",
            alignItems:"center",justifyContent:"center",cursor:"pointer"}}>
          <ITrash/>
        </button>
      </div>
    </div>
  );
}

/* ─── Field ───────────────────────────────────────────────────── */
function Field({label,error,children}){
  return (
    <div>
      <label style={{display:"block",color:"#94a3b8",fontSize:13,fontWeight:700,marginBottom:6,textTransform:"uppercase",letterSpacing:"0.5px"}}>{label}</label>
      {children}
      {error && <p style={{color:"#f87171",fontSize:12,marginTop:4}}>{error}</p>}
    </div>
  );
}

const inputStyle = (err) => ({
  width:"100%",background:"#0f172a",
  border:`2px solid ${err?"#ef4444":"#334155"}`,
  borderRadius:12,padding:"13px 14px",fontSize:16,
  color:"#f1f5f9",outline:"none",boxSizing:"border-box",
  fontFamily:"inherit",
});

/* ─── Form Sheet ──────────────────────────────────────────────── */
function FormSheet({product,onSave,onClose}){
  const [f,setF] = useState(product ? {...product} : {...BLANK});
  const [err,setErr] = useState({});
  const set = (k,v) => setF(p=>({...p,[k]:v}));

  const validate = () => {
    const e = {};
    if(!f.name.trim()) e.name = "Product name is required";
    if(f.retailPrice===""||isNaN(f.retailPrice)) e.retailPrice = "Enter a valid price";
    return e;
  };

  const save = () => {
    const e = validate();
    if(Object.keys(e).length){setErr(e);return;}
    onSave({...f, id:f.id||Date.now(), updatedAt:today()});
  };

  return (
    <div style={{position:"fixed",inset:0,zIndex:60,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
      <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.7)",backdropFilter:"blur(4px)"}} onClick={onClose}/>
      <div style={{position:"relative",width:"100%",maxWidth:520,background:"#0f172a",
        borderTop:"1px solid #1e293b",borderRadius:"24px 24px 0 0",
        maxHeight:"90vh",overflowY:"auto",boxShadow:"0 -20px 60px rgba(0,0,0,0.5)"}}>

        {/* Handle */}
        <div style={{display:"flex",justifyContent:"center",paddingTop:12}}>
          <div style={{width:40,height:4,borderRadius:99,background:"#334155"}}/>
        </div>

        {/* Header */}
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",
          padding:"14px 20px 16px",borderBottom:"1px solid #1e293b"}}>
          <h2 style={{color:"#f1f5f9",fontWeight:800,fontSize:18,margin:0}}>
            {product?.id ? "✏️ Edit Product" : "➕ Add Product"}
          </h2>
          <button onClick={onClose} style={{width:36,height:36,borderRadius:10,
            background:"#1e293b",border:"none",color:"#64748b",cursor:"pointer",
            display:"flex",alignItems:"center",justifyContent:"center"}}>
            <IClose/>
          </button>
        </div>

        {/* Fields */}
        <div style={{padding:"20px",display:"flex",flexDirection:"column",gap:16}}>
          <Field label="Product Name *" error={err.name}>
            <input value={f.name} onChange={e=>set("name",e.target.value)}
              placeholder="Enter product name"
              style={inputStyle(err.name)}/>
          </Field>

          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            <Field label="Retail Price ₹ *" error={err.retailPrice}>
              <input type="number" min="0" value={f.retailPrice} onChange={e=>set("retailPrice",e.target.value)}
                placeholder="0" style={inputStyle(err.retailPrice)}/>
            </Field>
            <Field label="Wholesale ₹">
              <input type="number" min="0" value={f.wholesalePrice} onChange={e=>set("wholesalePrice",e.target.value)}
                placeholder="0 or blank" style={inputStyle(false)}/>
            </Field>
          </div>

          <Field label="Notes (optional)">
            <input value={f.notes} onChange={e=>set("notes",e.target.value)}
              placeholder="e.g. 12 soaps box" style={inputStyle(false)}/>
          </Field>
        </div>

        {/* Actions */}
        <div style={{padding:"0 20px 36px",display:"flex",gap:12}}>
          <button onClick={onClose}
            style={{flex:1,padding:"16px",borderRadius:14,
              border:"2px solid #334155",background:"transparent",
              color:"#94a3b8",fontWeight:700,fontSize:16,cursor:"pointer",fontFamily:"inherit"}}>
            Cancel
          </button>
          <button onClick={save}
            style={{flex:1,padding:"16px",borderRadius:14,border:"none",
              background:"#22c55e",color:"#0f172a",fontWeight:800,fontSize:16,
              cursor:"pointer",fontFamily:"inherit",boxShadow:"0 4px 20px rgba(34,197,94,0.35)"}}>
            {product?.id ? "Save Changes" : "Add Product"}
          </button>
        </div>
      </div>
    </div>
  );
}

/* ─── Delete confirm ──────────────────────────────────────────── */
function DeleteSheet({product,onConfirm,onClose}){
  return (
    <div style={{position:"fixed",inset:0,zIndex:60,display:"flex",alignItems:"center",justifyContent:"center",padding:"0 20px"}}>
      <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.7)",backdropFilter:"blur(4px)"}} onClick={onClose}/>
      <div style={{position:"relative",background:"#0f172a",border:"1px solid #334155",
        borderRadius:20,padding:28,maxWidth:320,width:"100%",textAlign:"center",
        boxShadow:"0 20px 60px rgba(0,0,0,0.5)"}}>
        <div style={{width:60,height:60,borderRadius:"50%",background:"rgba(239,68,68,0.15)",
          border:"1px solid rgba(239,68,68,0.3)",display:"flex",alignItems:"center",
          justifyContent:"center",margin:"0 auto 16px",color:"#f87171"}}>
          <ITrash/>
        </div>
        <h3 style={{color:"#f1f5f9",fontWeight:800,fontSize:18,margin:"0 0 8px"}}>Delete Product?</h3>
        <p style={{color:"#64748b",fontSize:14,margin:"0 0 24px",lineHeight:1.5}}>
          "<span style={{color:"#f1f5f9",fontWeight:700}}>{product.name}</span>" will be permanently removed.
        </p>
        <div style={{display:"flex",gap:12}}>
          <button onClick={onClose}
            style={{flex:1,padding:"14px",borderRadius:12,border:"2px solid #334155",
              background:"transparent",color:"#94a3b8",fontWeight:700,fontSize:15,cursor:"pointer",fontFamily:"inherit"}}>
            Cancel
          </button>
          <button onClick={onConfirm}
            style={{flex:1,padding:"14px",borderRadius:12,border:"none",
              background:"#dc2626",color:"#fff",fontWeight:800,fontSize:15,
              cursor:"pointer",fontFamily:"inherit",boxShadow:"0 4px 20px rgba(220,38,38,0.35)"}}>
            Delete
          </button>
        </div>
      </div>
    </div>
  );
}

/* ─── Toast ───────────────────────────────────────────────────── */
function Toast({msg,type}){
  return (
    <div style={{position:"fixed",top:16,left:"50%",transform:"translateX(-50%)",
      zIndex:100,padding:"12px 20px",borderRadius:14,fontWeight:700,fontSize:14,
      display:"flex",alignItems:"center",gap:8,whiteSpace:"nowrap",
      background:"#0f172a",
      border:`1px solid ${type==="del"?"rgba(239,68,68,0.5)":"rgba(34,197,94,0.5)"}`,
      color:type==="del"?"#f87171":"#4ade80",
      boxShadow:"0 8px 30px rgba(0,0,0,0.5)"}}>
      {type==="del"?"🗑":"✅"} {msg}
    </div>
  );
}

/* ─── App ─────────────────────────────────────────────────────── */
function App(){
  const [products, setProducts] = useState(()=>{
    try{
      const s = localStorage.getItem("shopdb_v3");
      if(s) return JSON.parse(s);
    }catch{}
    return MASTER;
  });

  const [search,  setSearch]  = useState("");
  const [form,    setForm]    = useState(null);  // null=hidden, {}=add, {...p}=edit
  const [delTgt,  setDelTgt]  = useState(null);
  const [toast,   setToast]   = useState(null);
  const searchRef = useRef();

  useEffect(()=>{ localStorage.setItem("shopdb_v3",JSON.stringify(products)); },[products]);

  const fire = (msg,type="ok") => {
    setToast({msg,type});
    setTimeout(()=>setToast(null),2200);
  };

  const handleSave = (data) => {
    setProducts(prev=>{
      const exists = prev.find(p=>p.id===data.id);
      return exists ? prev.map(p=>p.id===data.id?data:p) : [data,...prev];
    });
    setForm(null);
    fire(data.id&&products.find(p=>p.id===data.id) ? "✏️ Product updated!" : "➕ Product added!");
  };

  const handleDelete = () => {
    fire(`Deleted "${delTgt.name}"`, "del");
    setProducts(prev=>prev.filter(p=>p.id!==delTgt.id));
    setDelTgt(null);
  };

  const q = search.toLowerCase().trim();
  const filtered = q
    ? products.filter(p=>p.name.toLowerCase().includes(q))
    : products;

  return (
    <div style={{minHeight:"100vh",background:"#020617"}}>

      {/* ── Fixed header ─────────────────────────────────────── */}
      <div style={{position:"fixed",top:0,left:0,right:0,zIndex:40,
        background:"rgba(2,6,23,0.97)",backdropFilter:"blur(12px)",
        borderBottom:"1px solid #1e293b"}}>
        <div style={{maxWidth:520,margin:"0 auto",padding:"16px 16px 14px"}}>

          {/* Title row */}
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
            <div>
              <h1 style={{color:"#f1f5f9",fontWeight:800,fontSize:20,margin:0,letterSpacing:"-0.5px",lineHeight:1}}>
                🏪 Shop Manager
              </h1>
              <p style={{color:"#475569",fontSize:12,margin:"3px 0 0",fontWeight:500}}>
                {filtered.length} of {products.length} products
              </p>
            </div>
          </div>

          {/* Search bar */}
          <div style={{position:"relative"}}>
            <span style={{position:"absolute",left:14,top:"50%",transform:"translateY(-50%)",
              color:"#22c55e",pointerEvents:"none",display:"flex"}}>
              <ISearch/>
            </span>
            <input
              ref={searchRef}
              type="search"
              value={search}
              onChange={e=>setSearch(e.target.value)}
              placeholder="Search any product instantly..."
              style={{width:"100%",background:"#1e293b",
                border:"2px solid rgba(34,197,94,0.45)",borderRadius:14,
                paddingLeft:44,paddingRight:search?42:16,
                paddingTop:14,paddingBottom:14,
                fontSize:16,color:"#f1f5f9",outline:"none",
                boxSizing:"border-box",fontFamily:"inherit",
                boxShadow:"0 0 0 0px rgba(34,197,94,0.2)",
              }}
            />
            {search && (
              <button onClick={()=>{setSearch("");searchRef.current?.focus();}}
                style={{position:"absolute",right:14,top:"50%",transform:"translateY(-50%)",
                  background:"none",border:"none",color:"#475569",cursor:"pointer",
                  padding:4,display:"flex"}}>
                <IClose/>
              </button>
            )}
          </div>
        </div>
      </div>

      {/* ── Product list ─────────────────────────────────────── */}
      <div style={{maxWidth:520,margin:"0 auto",padding:"148px 16px 120px"}}>

        {filtered.length === 0 ? (
          <div style={{textAlign:"center",padding:"60px 20px",color:"#334155"}}>
            <div style={{fontSize:52,marginBottom:12}}>🔍</div>
            <p style={{color:"#475569",fontWeight:700,fontSize:18,margin:"0 0 6px"}}>No products found</p>
            <p style={{color:"#334155",fontSize:14,margin:0}}>Try a different search term</p>
          </div>
        ) : (
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            {filtered.map(p=>(
              <Card key={p.id} p={p}
                onEdit={prod=>{setForm({...prod});}}
                onDelete={setDelTgt}
              />
            ))}
          </div>
        )}

        {/* Legend */}
        <div style={{marginTop:28,background:"rgba(30,41,59,0.5)",
          border:"1px solid #1e293b",borderRadius:14,
          padding:"12px 16px",display:"flex",gap:20,justifyContent:"center",flexWrap:"wrap"}}>
          <span style={{display:"flex",alignItems:"center",gap:8,fontSize:13,color:"#64748b"}}>
            <span style={{width:10,height:10,borderRadius:"50%",background:"#4ade80",flexShrink:0,display:"inline-block"}}/>
            <b style={{color:"#94a3b8"}}>Retail</b> — per piece
          </span>
          <span style={{display:"flex",alignItems:"center",gap:8,fontSize:13,color:"#64748b"}}>
            <span style={{width:10,height:10,borderRadius:"50%",background:"#38bdf8",flexShrink:0,display:"inline-block"}}/>
            <b style={{color:"#94a3b8"}}>Wholesale</b> — box / bulk
          </span>
        </div>
      </div>

      {/* ── FAB: Add product ─────────────────────────────────── */}
      <button
        onClick={()=>setForm({...BLANK})}
        aria-label="Add product"
        style={{position:"fixed",bottom:28,right:18,zIndex:40,
          width:64,height:64,borderRadius:"50%",
          background:"#22c55e",color:"#0f172a",border:"4px solid #020617",
          display:"flex",alignItems:"center",justifyContent:"center",
          boxShadow:"0 8px 32px rgba(34,197,94,0.45)",cursor:"pointer"}}>
        <IPlus/>
      </button>

      {/* ── Modals ───────────────────────────────────────────── */}
      {form    && <FormSheet product={form.id?form:null} onSave={handleSave} onClose={()=>setForm(null)}/>}
      {delTgt  && <DeleteSheet product={delTgt} onConfirm={handleDelete} onClose={()=>setDelTgt(null)}/>}
      {toast   && <Toast msg={toast.msg} type={toast.type}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
